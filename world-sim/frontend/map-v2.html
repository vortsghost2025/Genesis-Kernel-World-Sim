<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Sim — Dual Hemisphere Map</title>
    <style>
        :root {
            --bg: #0a0a0a; --panel: #1a1a1a; --card: #2a2a2a; --border: #444;
            --text: #ffffff; --text2: #cccccc; --muted: #888888;
            --gold: #ffd700; --green: #00ff88; --blue: #4488ff; --red: #ff4444;
            --east-color: #4488ff; --west-color: #ff8844;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 18px; }
        
        header { background: var(--panel); border-bottom: 3px solid var(--gold); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        header h1 { font-size: 2rem; color: var(--gold); }
        .nav-links a { color: var(--blue); text-decoration: underline; font-size: 1.2rem; padding: 0.5rem 1rem; }
        .nav-links a:hover { background: var(--card); border-radius: 6px; }
        
        .map-controls { display: flex; gap: 1rem; flex-wrap: wrap; padding: 1rem 2rem; background: var(--panel); }
        .map-controls button { 
            padding: 1rem 2rem; background: var(--card); border: 3px solid var(--border); color: var(--text); border-radius: 10px; cursor: pointer; font-size: 1.2rem; font-weight: 600; min-height: 60px;
        }
        .map-controls button:hover, .map-controls button:focus { background: var(--gold); color: #000; border-color: var(--gold); outline: 3px solid var(--gold); outline-offset: 2px; }
        .map-controls button.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .map-controls button.east-active { background: var(--east-color); color: #000; border-color: var(--east-color); }
        .map-controls button.west-active { background: var(--west-color); color: #000; border-color: var(--west-color); }
        
        .map-container { max-width: 1800px; margin: 0 auto; padding: 1rem; }
        
        /* Dual hemisphere layout */
        .hemispheres { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .hemisphere { position: relative; }
        .hemisphere-label { 
            position: absolute; top: 0.5rem; left: 50%; transform: translateX(-50%); 
            background: rgba(10,10,10,0.9); border: 2px solid var(--border); border-radius: 8px; 
            padding: 0.5rem 1.5rem; font-size: 1.2rem; font-weight: 700; z-index: 5;
        }
        .hemisphere-label.east { border-color: var(--east-color); color: var(--east-color); }
        .hemisphere-label.west { border-color: var(--west-color); color: var(--west-color); }
        
        .map-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16 / 9; background: #1a2a3a; border: 3px solid var(--border); border-radius: 12px; overflow: hidden;
        }
        .map-wrapper.locked { opacity: 0.3; pointer-events: none; }
        .map-wrapper.locked::after {
            content: "🔒 Undiscovered — explore to reveal";
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10,10,10,0.9); border: 2px solid var(--gold); border-radius: 12px;
            padding: 1rem 2rem; font-size: 1.2rem; color: var(--gold); text-align: center;
        }
        .map-svg { width: 100%; height: 100%; }
        
        .info-panel { 
            position: absolute; top: 1rem; right: 1rem; background: rgba(10, 10, 10, 0.95); border: 3px solid var(--gold); border-radius: 12px; padding: 1.5rem; min-width: 300px; max-width: 400px; display: none; z-index: 10;
        }
        .info-panel.visible { display: block; }
        .info-panel h3 { font-size: 1.5rem; color: var(--gold); margin-bottom: 0.8rem; }
        .info-panel p { font-size: 1.1rem; color: var(--text2); line-height: 1.5; }
        .info-panel .meta { font-size: 0.9rem; color: var(--muted); margin-top: 0.8rem; padding-top: 0.8rem; border-top: 2px solid var(--border); }
        .info-panel .close-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: var(--card); border: 2px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        
        .legend { display: flex; gap: 2rem; flex-wrap: wrap; padding: 1.5rem 2rem; background: var(--panel); border-radius: 8px; margin-top: 1rem; }
        .legend-item { display: flex; align-items: center; gap: 0.8rem; font-size: 1.1rem; }
        .legend-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; }
        .legend-dot.east { background: var(--east-color); }
        .legend-dot.west { background: var(--west-color); }
        .legend-dot.settlement { background: var(--gold); }
        .legend-dot.character { background: var(--blue); }
        .legend-dot.river { background: #4a90d9; width: 30px; height: 6px; border-radius: 3px; border: none; }
        .legend-dot.locked { background: var(--muted); opacity: 0.5; }
        
        .disclaimer { text-align: center; padding: 1rem; font-size: 1rem; color: var(--muted); font-style: italic; }
        .keyboard-hint { text-align: center; padding: 0.5rem; font-size: 0.9rem; color: var(--muted); }
        .keyboard-hint kbd { background: var(--card); padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid var(--border); }
        
        .entity-marker { cursor: pointer; }
        .entity-marker:hover circle, .entity-marker:focus circle { stroke-width: 3; stroke: var(--gold); }
        .entity-label { font-size: 14px; font-weight: 700; fill: #fff; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .river-path { stroke: #4a90d9; stroke-width: 5; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 3px rgba(74,144,217,0.5)); }
        .river-label { fill: #4a90d9; font-size: 14px; font-style: italic; font-weight: 600; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .locked-entity { opacity: 0.25; }
        .locked-label { fill: #666; font-size: 12px; }
        
        /* Single hemisphere mode */
        .hemispheres.single .hemisphere.west { display: none; }
        .hemispheres.single .hemisphere.east { grid-column: 1 / -1; max-width: 800px; margin: 0 auto; }
        
        @media (max-width: 900px) {
            .hemispheres { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🗺️ World Map — East & West</h1>
        <div class="nav-links">
            <a href="/sim">← Back to Dashboard</a>
        </div>
    </header>

    <div class="map-controls" id="layer-controls" role="toolbar" aria-label="Map layer controls">
        <button class="active" data-layer="all" aria-pressed="true">Show All</button>
        <button data-layer="east" aria-pressed="false">East Hemisphere</button>
        <button data-layer="west" aria-pressed="false">West Hemisphere</button>
        <button data-layer="discovered" aria-pressed="false">Discovered</button>
        <button data-layer="rivers" aria-pressed="false">Rivers</button>
        <button data-layer="characters" aria-pressed="false">Characters</button>
        <button data-layer="settlements" aria-pressed="false">Settlements</button>
        <button data-layer="future_locked" aria-pressed="false">Future (Locked)</button>
    </div>

    <div class="map-container">
        <div class="hemispheres" id="hemispheres">
            <!-- EAST HEMISPHERE -->
            <div class="hemisphere east">
                <div class="hemisphere-label east">🌍 Eastern Hemisphere</div>
                <div class="map-wrapper" id="map-east">
                    <svg class="map-svg" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                        </defs>
                        <image href="/data/base_map.png" width="1200" height="675" preserveAspectRatio="xMidYMid slice"/>
                        <g id="east-rivers-layer"></g>
                        <g id="east-discovered-layer"></g>
                        <g id="east-characters-layer"></g>
                        <g id="east-settlements-layer"></g>
                        <g id="east-future-locked-layer"></g>
                    </svg>
                    <div class="info-panel" id="info-east">
                        <button class="close-btn" onclick="closeInfo('east')" aria-label="Close">✕</button>
                        <h3 id="info-east-title">Location</h3>
                        <p id="info-east-desc">Description</p>
                        <div class="meta" id="info-east-meta"></div>
                    </div>
                </div>
            </div>

            <!-- WEST HEMISPHERE -->
            <div class="hemisphere west">
                <div class="hemisphere-label west">🌎 Western Hemisphere</div>
                <div class="map-wrapper locked" id="map-west">
                    <svg class="map-svg" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <filter id="glow-west"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                        </defs>
                        <image href="/data/base_map_west.png" width="1200" height="675" preserveAspectRatio="xMidYMid slice"/>
                        <g id="west-rivers-layer"></g>
                        <g id="west-discovered-layer"></g>
                        <g id="west-characters-layer"></g>
                        <g id="west-settlements-layer"></g>
                        <g id="west-future-locked-layer"></g>
                    </svg>
                    <div class="info-panel" id="info-west">
                        <button class="close-btn" onclick="closeInfo('west')" aria-label="Close">✕</button>
                        <h3 id="info-west-title">Location</h3>
                        <p id="info-west-desc">Description</p>
                        <div class="meta" id="info-west-meta"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="legend" role="list" aria-label="Map legend">
            <div class="legend-item" role="listitem"><span class="legend-dot east"></span> East Hemisphere</div>
            <div class="legend-item" role="listitem"><span class="legend-dot west"></span> West Hemisphere</div>
            <div class="legend-item" role="listitem"><span class="legend-dot character"></span> Characters</div>
            <div class="legend-item" role="listitem"><span class="legend-dot settlement"></span> Settlements</div>
            <div class="legend-item" role="listitem"><span class="legend-dot river"></span> Rivers</div>
            <div class="legend-item" role="listitem"><span class="legend-dot locked"></span> Future (Locked)</div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>
        <div class="keyboard-hint">
            <kbd>Tab</kbd> to navigate · <kbd>Enter</kbd> to select · <kbd>Esc</kbd> to close info · Click markers for details
        </div>
    </div>

    <script>
        let mapState = null;
        let currentLayer = 'all';
        let westDiscovered = false;

        async function loadMapState() {
            try {
                const res = await fetch('/api/map-state');
                mapState = await res.json();
                document.getElementById('disclaimer').textContent = mapState.disclaimer || '';
                
                // Check if west is discovered
                if (mapState.regions && mapState.regions.west) {
                    westDiscovered = mapState.regions.west.discovered || false;
                    if (westDiscovered) {
                        document.getElementById('map-west').classList.remove('locked');
                    }
                }
                
                renderMap('east');
                renderMap('west');
            } catch (err) {
                console.error('Failed to load map state:', err);
            }
        }

        function renderMap(region) {
            if (!mapState) return;

            const riversLayer = document.getElementById(`${region}-rivers-layer`);
            const discoveredLayer = document.getElementById(`${region}-discovered-layer`);
            const charactersLayer = document.getElementById(`${region}-characters-layer`);
            const settlementsLayer = document.getElementById(`${region}-settlements-layer`);
            const futureLockedLayer = document.getElementById(`${region}-future-locked-layer`);

            [riversLayer, discoveredLayer, charactersLayer, settlementsLayer, futureLockedLayer].forEach(l => l.innerHTML = '');

            const regionEntities = mapState.entities.filter(e => e.region === region);

            regionEntities.forEach(entity => {
                const layer = getLayerForEntity(entity);
                if (!layer) return;

                if (entity.type === 'river' && entity.path) {
                    const pathD = entity.path.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0] * 1200} ${p[1] * 675}`).join(' ');
                    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    pathEl.setAttribute('d', pathD);
                    pathEl.setAttribute('class', 'river-path');
                    pathEl.setAttribute('data-layer', 'rivers');
                    pathEl.setAttribute('data-region', region);
                    pathEl.setAttribute('tabindex', '0');
                    pathEl.setAttribute('role', 'button');
                    pathEl.setAttribute('aria-label', entity.name + ' river');
                    pathEl.addEventListener('click', () => showInfo(entity, region));
                    pathEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') showInfo(entity, region); });
                    riversLayer.appendChild(pathEl);

                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', entity.path[0][0] * 1200 + 15);
                    label.setAttribute('y', entity.path[0][1] * 675);
                    label.setAttribute('class', 'river-label');
                    label.textContent = entity.name;
                    riversLayer.appendChild(label);
                } else if (entity.x !== undefined && entity.y !== undefined) {
                    const x = entity.x * 1200;
                    const y = entity.y * 675;

                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', `entity-marker ${entity.discovered ? '' : 'locked-entity'}`);
                    g.setAttribute('data-layer', layer);
                    g.setAttribute('data-region', region);
                    g.setAttribute('data-id', entity.id);
                    g.setAttribute('tabindex', '0');
                    g.setAttribute('role', 'button');
                    g.setAttribute('aria-label', entity.name + (entity.discovered ? '' : ' (locked)'));

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', x);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', entity.type === 'character' ? 12 : 14);
                    const color = entity.color || (region === 'east' ? '#4488ff' : '#ff8844');
                    circle.setAttribute('fill', entity.discovered ? color : '#666666');
                    circle.setAttribute('stroke', '#fff');
                    circle.setAttribute('stroke-width', '2');
                    if (entity.discovered) circle.setAttribute('filter', `url(#${region === 'east' ? 'glow' : 'glow-west'})`);
                    g.appendChild(circle);

                    const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    icon.setAttribute('x', x);
                    icon.setAttribute('y', y - 20);
                    icon.setAttribute('text-anchor', 'middle');
                    icon.setAttribute('font-size', '18');
                    icon.textContent = entity.icon || '📍';
                    g.appendChild(icon);

                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', x);
                    label.setAttribute('y', y + 28);
                    label.setAttribute('text-anchor', 'middle');
                    label.setAttribute('class', entity.discovered ? 'entity-label' : 'locked-label');
                    label.setAttribute('fill', entity.discovered ? (entity.color || '#e8e6e3') : '#6b7280');
                    label.textContent = entity.name + (entity.discovered ? '' : ' (locked)');
                    g.appendChild(label);

                    g.addEventListener('click', () => showInfo(entity, region));
                    g.addEventListener('keydown', (e) => { if (e.key === 'Enter') showInfo(entity, region); });

                    if (layer === 'discovered') discoveredLayer.appendChild(g);
                    else if (layer === 'characters') charactersLayer.appendChild(g);
                    else if (layer === 'settlements') settlementsLayer.appendChild(g);
                    else if (layer === 'future_locked') futureLockedLayer.appendChild(g);
                }
            });

            applyLayerFilter();
        }

        function getLayerForEntity(entity) {
            if (!entity.discovered) return 'future_locked';
            if (entity.type === 'character') return 'characters';
            if (entity.type === 'settlement') return 'settlements';
            if (entity.type === 'river') return 'rivers';
            return 'discovered';
        }

        function applyLayerFilter() {
            document.querySelectorAll('.entity-marker, .river-path, .river-label').forEach(el => {
                const layer = el.getAttribute('data-layer');
                const region = el.getAttribute('data-region');
                
                if (currentLayer === 'all') {
                    el.style.opacity = '1';
                } else if (currentLayer === 'east' || currentLayer === 'west') {
                    el.style.opacity = region === currentLayer ? '1' : '0.1';
                } else if (layer === currentLayer) {
                    el.style.opacity = '1';
                } else {
                    el.style.opacity = '0.15';
                }
            });
        }

        function showInfo(entity, region) {
            const panel = document.getElementById(`info-${region}`);
            document.getElementById(`info-${region}-title`).textContent = `${entity.icon || '📍'} ${entity.name}`;
            document.getElementById(`info-${region}-desc`).textContent = entity.description || '';
            document.getElementById(`info-${region}-meta`).innerHTML = `
                Region: ${region === 'east' ? '🌍 East' : '🌎 West'}<br>
                Source: ${entity.source_type} | Confidence: ${entity.confidence}<br>
                Discovered: ${entity.discovered ? 'Yes' : 'No'} | Tick: ${entity.first_seen_tick || '—'}
            `;
            panel.classList.add('visible');
            panel.querySelector('.close-btn').focus();
        }

        function closeInfo(region) {
            document.getElementById(`info-${region}`).classList.remove('visible');
        }

        // Layer controls
        document.getElementById('layer-controls').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                document.querySelectorAll('.map-controls button').forEach(b => {
                    b.classList.remove('active', 'east-active', 'west-active');
                    b.setAttribute('aria-pressed', 'false');
                });
                e.target.classList.add('active');
                if (e.target.dataset.layer === 'east') e.target.classList.add('east-active');
                if (e.target.dataset.layer === 'west') e.target.classList.add('west-active');
                e.target.setAttribute('aria-pressed', 'true');
                currentLayer = e.target.dataset.layer;
                applyLayerFilter();
                
                // Toggle hemisphere visibility
                const hemispheres = document.getElementById('hemispheres');
                if (currentLayer === 'east') {
                    hemispheres.classList.add('single');
                } else if (currentLayer === 'west') {
                    hemispheres.classList.add('single');
                } else {
                    hemispheres.classList.remove('single');
                }
            }
        });

        // Close info panel on outside click or Escape
        document.querySelectorAll('.map-wrapper').forEach(wrapper => {
            wrapper.addEventListener('click', (e) => {
                if (!e.target.closest('.entity-marker') && !e.target.closest('.info-panel')) {
                    wrapper.querySelector('.info-panel').classList.remove('visible');
                }
            });
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.info-panel').forEach(p => p.classList.remove('visible'));
            }
        });

        loadMapState();
    </script>
</body>
</html>
